services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://valley:valley@db:5432/valley
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: valley
      POSTGRES_USER: valley
      POSTGRES_PASSWORD: valley
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
