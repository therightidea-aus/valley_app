<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f4f2;color:#16191b;font-family:Arial,sans-serif">
    <div style="max-width:640px;margin:0 auto;padding:28px 18px">
      <div style="background:#ffffff;border:1px solid #d8ddda;border-radius:8px;padding:28px">
        <p style="margin:0 0 8px;color:#b45145;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Valley update</p>
        <h1 style="margin:0 0 18px;font-size:28px;line-height:1.15;color:#16191b">{{ announcement.title }}</h1>
        <div style="color:#465057;font-size:16px;line-height:1.6;white-space:pre-line">{{ announcement.body }}</div>
      </div>
    </div>
  </body>
</html>
