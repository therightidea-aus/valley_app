{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#16191b">
  <title>Reset password · Valley</title>
  <link rel="manifest" href="{% static 'church/manifest.webmanifest' %}">
  <link rel="stylesheet" href="{% static 'church/app.css' %}?v=13">
</head>
<body>
  <main class="login-page">
    <form class="login-card" method="post">
      {% csrf_token %}
      <img class="login-logo" src="{% static 'church/img/vcc-logo-black.jpg' %}" alt="Valley Community Church">
      <h1 class="section-title" style="font-size:28px;margin-bottom:8px">Reset password</h1>
      <p class="muted" style="margin-bottom:22px">Enter your email and we will send you a link to choose a new password.</p>

      {% if form.email.errors %}
        <div class="message">{{ form.email.errors|striptags }}</div>
      {% endif %}

      <div class="field">
        <label for="{{ form.email.id_for_label }}">Email</label>
        {{ form.email }}
      </div>

      <button class="button" type="submit" style="width:100%">Send reset link</button>
      <p class="muted auth-link"><a href="{% url 'login' %}">Back to login</a></p>
    </form>
  </main>
</body>
</html>
