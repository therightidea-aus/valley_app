{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#16191b">
  <title>Password updated · Valley</title>
  <link rel="manifest" href="{% static 'church/manifest.webmanifest' %}">
  <link rel="stylesheet" href="{% static 'church/app.css' %}?v=13">
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <img class="login-logo" src="{% static 'church/img/vcc-logo-black.jpg' %}" alt="Valley Community Church">
      <h1 class="section-title" style="font-size:28px;margin-bottom:8px">Password updated</h1>
      <p class="muted" style="margin-bottom:22px">Your password has been changed.</p>
      <a class="button" href="{% url 'profile' %}" style="width:100%">Back to profile</a>
    </div>
  </main>
</body>
</html>
